<!DOCTYPE html>
<html>
<head>
    <title>Contact Us - AgroGuide</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI';
        }

        body {
            background: #f4fff4;
        }

        header {
            background: linear-gradient(to right, #2e7d32, #66bb6a);
            color: white;
            text-align: center;
            padding: 20px;
        }

        nav {
            display: flex;
            justify-content: center;
            background: #1b5e20;
        }

        nav a {
            color: white;
            padding: 14px 20px;
            text-decoration: none;
        }

        nav a:hover {
            background: #66bb6a;
            border-radius: 5px;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 70vh;
        }

        .form-box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            width: 350px;
            text-align: center;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            background: #2e7d32;
            color: white;
            padding: 10px;
            border: none;
            width: 100%;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #66bb6a;
        }

        footer {
            background: #1b5e20;
            color: white;
            text-align: center;
            padding: 15px;
        }
    </style>
</head>

<body>

<header>
    <h1>📞 Contact Us</h1>
    <p>Get in touch with AgroGuide</p>
</header>

<!-- SAME NAVBAR -->
<nav>
    <a href="home.html">Home</a>
    <a href="crops.html">Crops</a>
    <a href="tips.html">Tips</a>
    <a href="schemes.html">Schemes</a>
    <a href="contact.html">Contact</a>
</nav>

<div class="container">
    <div class="form-box">
        <h2>Send Message</h2>

        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Your Email" required>
        <textarea rows="4" placeholder="Your Message"></textarea>

        <button>Submit</button>
    </div>
</div>

<footer>
    <p>© 2026 AgroGuide</p>
</footer>

</body>
</html>
